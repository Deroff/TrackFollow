<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#12101a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="textG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orb" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="dotglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Glow orb behind text -->
  <circle cx="128" cy="112" r="80" fill="#6d28d9" opacity="0.18" filter="url(#orb)"/>

  <!-- TF text -->
  <text x="128" y="142"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="100"
    text-anchor="middle"
    fill="url(#textG)"
    filter="url(#glow)"
  >TF</text>

  <!-- Mini progress bar -->
  <rect x="40" y="182" width="176" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="40" y="182" width="88"  height="5" rx="2.5" fill="url(#accent)" opacity="0.75"/>

  <!-- Dot on progress bar (at 50%) -->
  <circle cx="128" cy="184.5" r="10" fill="url(#accent)" opacity="0.9" filter="url(#dotglow)"/>
  <circle cx="128" cy="184.5" r="5"  fill="white" opacity="0.95"/>
</svg>