<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#12101a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/></feMerge>
    </filter>
    <filter id="spriteglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="640" cy="360" r="300" fill="#7c3aed" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="300" cy="200" r="150" fill="#4f46e5" opacity="0.08" filter="url(#softglow)"/>
  <circle cx="980" cy="520" r="180" fill="#6d28d9" opacity="0.07" filter="url(#softglow)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Main title: TrackFollow -->
  <text
    x="640" y="400"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="148"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >TrackFollow</text>

  <!-- Progress bar -->
  <rect x="200" y="490" width="880" height="6" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="200" y="490" width="440" height="6" rx="3" fill="url(#accent)" opacity="0.7"/>

  <!-- Progress dot -->
  <circle cx="640" cy="493" r="14" fill="url(#accent)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="640" cy="493" r="7" fill="white" opacity="0.95"/>

  <!-- ===== PIXEL CAT (smaller, scale 0.65) sitting above dot ===== -->
  <g transform="translate(614, 428) scale(0.65)" filter="url(#spriteglow)">
    <!-- Shadow -->
    <ellipse cx="24" cy="86" rx="26" ry="5" fill="#7c3aed" opacity="0.4"/>

    <!-- Ears -->
    <rect x="4"  y="0"  width="6" height="6" fill="#c4b5fd"/>
    <rect x="10" y="0"  width="6" height="6" fill="#c4b5fd"/>
    <rect x="26" y="0"  width="6" height="6" fill="#c4b5fd"/>
    <rect x="32" y="0"  width="6" height="6" fill="#c4b5fd"/>
    <!-- Inner ears -->
    <rect x="5"  y="6"  width="5" height="5" fill="#ede9fe"/>
    <rect x="32" y="6"  width="5" height="5" fill="#ede9fe"/>

    <!-- Head -->
    <rect x="4"  y="6"  width="34" height="6" fill="#ddd6fe"/>
    <rect x="0"  y="12" width="42" height="6" fill="#ddd6fe"/>
    <!-- Eyes row -->
    <rect x="0"  y="18" width="42" height="6" fill="#ddd6fe"/>
    <rect x="6"  y="18" width="6" height="6" fill="#1e1b4b"/>
    <rect x="30" y="18" width="6" height="6" fill="#1e1b4b"/>
    <!-- Eye shine -->
    <rect x="7"  y="19" width="3" height="3" fill="#ffffff"/>
    <rect x="31" y="19" width="3" height="3" fill="#ffffff"/>
    <!-- Nose/mouth row -->
    <rect x="0"  y="24" width="42" height="6" fill="#ddd6fe"/>
    <rect x="18" y="24" width="6" height="4" fill="#a78bfa"/>
    <!-- Cheeks -->
    <rect x="3"  y="25" width="5" height="4" fill="#f9a8d4" fill-opacity="0.55"/>
    <rect x="34" y="25" width="5" height="4" fill="#f9a8d4" fill-opacity="0.55"/>

    <!-- Neck -->
    <rect x="12" y="30" width="18" height="6" fill="#c4b5fd"/>

    <!-- Body -->
    <rect x="0"  y="36" width="42" height="6" fill="#c4b5fd"/>
    <!-- Collar -->
    <rect x="0"  y="36" width="42" height="6" fill="#c4b5fd"/>
    <rect x="14" y="36" width="14" height="6" fill="#fbbf24"/>
    <rect x="18" y="39" width="6"  height="5" fill="#f59e0b"/>
    <!-- Body rows -->
    <rect x="0"  y="42" width="42" height="6" fill="#c4b5fd"/>
    <rect x="0"  y="48" width="42" height="6" fill="#c4b5fd"/>
    <rect x="0"  y="54" width="42" height="6" fill="#c4b5fd"/>

    <!-- Paws -->
    <rect x="0"  y="60" width="12" height="6" fill="#c4b5fd"/>
    <rect x="30" y="60" width="12" height="6" fill="#c4b5fd"/>
    <rect x="0"  y="66" width="6"  height="4" fill="#a78bfa"/>
    <rect x="6"  y="66" width="6"  height="4" fill="#a78bfa"/>
    <rect x="30" y="66" width="6"  height="4" fill="#a78bfa"/>
    <rect x="36" y="66" width="6"  height="4" fill="#a78bfa"/>

    <!-- Tail -->
    <rect x="42" y="36" width="6" height="18" fill="#c4b5fd"/>
    <rect x="42" y="24" width="6" height="12" fill="#c4b5fd"/>
    <rect x="36" y="24" width="6" height="6"  fill="#c4b5fd"/>
    <rect x="36" y="18" width="6" height="6"  fill="#c4b5fd"/>
    <rect x="42" y="18" width="6" height="6"  fill="#c4b5fd"/>
    <rect x="48" y="18" width="6" height="12" fill="#c4b5fd"/>
    <rect x="48" y="30" width="6" height="6"  fill="#c4b5fd"/>

    <!-- Sparkles -->
    <text x="-16" y="26" font-size="12" fill="#a78bfa" opacity="0.8">✦</text>
    <text x="54"  y="14" font-size="9"  fill="#818cf8" opacity="0.7">✦</text>
    <text x="-10" y="54" font-size="7"  fill="#c4b5fd" opacity="0.5">✦</text>
  </g>
  <!-- ===== END CAT ===== -->

  <!-- Subtitle -->
  <text
    x="640" y="560"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="20"
    text-anchor="middle"
    fill="#8b8fa8"
    letter-spacing="6"
  >PULSESYNC ADDON</text>

  <!-- Corner decorations -->
  <rect x="60" y="60" width="40" height="3" fill="url(#accent)" rx="2"/>
  <rect x="60" y="60" width="3" height="40" fill="url(#accent)" rx="2"/>
  <rect x="1180" y="60" width="40" height="3" fill="url(#accent)" rx="2"/>
  <rect x="1217" y="60" width="3" height="40" fill="url(#accent)" rx="2"/>
  <rect x="60" y="657" width="40" height="3" fill="url(#accent)" rx="2"/>
  <rect x="60" y="620" width="3" height="40" fill="url(#accent)" rx="2"/>
  <rect x="1180" y="657" width="40" height="3" fill="url(#accent)" rx="2"/>
  <rect x="1217" y="620" width="3" height="40" fill="url(#accent)" rx="2"/>
</svg>